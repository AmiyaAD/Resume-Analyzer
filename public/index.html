<!DOCTYPE html>
<html>
<head>
  <title>Resume Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Resume Analyzer Chatbot</h1>
  <div id="chatbox"></div>
  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Type keywords or a message..." />
    <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" />
    <button type="submit">Send</button>
  </form>
  <script src="app.js"></script>
</body>
</html>
